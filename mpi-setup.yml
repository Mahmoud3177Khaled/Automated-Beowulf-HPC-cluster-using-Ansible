---
- name: Install OpenMPI on worker nodes
  hosts: workers
  become: yes

  tasks:
    - name: Install OpenMPI runtime
      apt:
        name: openmpi-bin
        state: present
        update_cache: yes

- name: Compile and run MPI from control node
  hosts: localhost
  become: no

  tasks:

    - name: Install OpenMPI development tools on control node
      apt:
        name:
          - openmpi-bin
          - libopenmpi-dev
        state: present
        update_cache: yes
      become: yes

    - name: Create simple MPI Hello World program
      copy:
        content: |
          #include <mpi.h>
          #include <stdio.h>
          int main(int argc, char** argv) {
              MPI_Init(NULL, NULL);
              int world_size, world_rank;
              MPI_Comm_size(MPI_COMM_WORLD, &world_size);
              MPI_Comm_rank(MPI_COMM_WORLD, &world_rank);
              char name[MPI_MAX_PROCESSOR_NAME];
              int len;
              MPI_Get_processor_name(name, &len);
              printf("Hello from %s, rank %d of %d\n", name, world_rank, world_size);
              MPI_Finalize();
              return 0;
          }
        dest: /tmp/mpi_hello.c

    - name: Compile MPI program on control node
      command: mpicc /tmp/mpi_hello.c -o /tmp/mpi_hello
      args:
        creates: /tmp/mpi_hello

    - name: Generate hostfile dynamically from inventory
      copy:
        content: |
          {% for host in groups['workers'] %}
          {{ hostvars[host]['ansible_host'] }} slots=1
          {% endfor %}
        dest: /tmp/mpi_hostfile

    - name: Copy compiled binary to all worker nodes
      copy:
        src: /tmp/mpi_hello
        dest: /tmp/mpi_hello
        mode: '0755'
      delegate_to: "{{ item }}"
      loop: "{{ groups['workers'] }}"

    - name: Run MPI using dynamic hostfile
      command: mpirun -np {{ groups['workers'] | length }} --hostfile /tmp/mpi_hostfile --mca plm_rsh_agent "ssh -l ubuntu" /tmp/mpi_hello
      register: mpi_result
      changed_when: false

    - name: Display MPI test output
      debug:
        var: mpi_result.stdout_lines
